name: Release Executable

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout Sista dependency
        if: runner.os != 'Windows'
        uses: actions/checkout@v6
        with:
          repository: FLAK-ZOSO/Sista
          path: sista
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true

      - name: Build and install Sista (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          cd sista
          sudo make install
          cd ..

      - name: Run make
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            make USE_LOCAL_SISTA=1 STATIC=0
          else
            make
          fi

      - name: Find Executable
        id: find-exe
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "exe_path=$(find . -type f -name 'inavjaga.exe' | head -n 1)" >> $GITHUB_OUTPUT
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "exe_path=$(find . -name inavjaga -type f -perm +111 | head -n 1)" >> $GITHUB_OUTPUT
          else
            echo "exe_path=$(find . -name inavjaga -type f -perm /111 | head -n 1)" >> $GITHUB_OUTPUT
          fi

      - name: Rename executable (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mv "${{ steps.find-exe.outputs.exe_path }}" "inavjaga-${{ runner.os }}"

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item -Path "${{ steps.find-exe.outputs.exe_path }}" -Destination "inavjaga-${{ runner.os }}.exe"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            inavjaga-${{ runner.os }}*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
